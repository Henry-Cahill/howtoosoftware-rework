name: "CodeQL"

# Advanced CodeQL setup.
#
# This replaces GitHub's "default setup" so we can apply path exclusions via
# .github/codeql/codeql-config.yml (default setup does not support
# paths-ignore).  The "Disable Default CodeQL Setup" step requires a token
# with `administration: write`; the default `github.token` cannot be granted
# that scope.  Store a fine-grained PAT or GitHub App installation token with
# `administration: write` as the repository secret GH_ADMIN_TOKEN.  Without
# it the step will return 403 and Default Setup must be disabled manually
# under Settings → Code security → Code scanning.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly scan, Mondays 03:27 UTC.
    - cron: "27 3 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Required to upload code-scanning results.
      security-events: write
      # Required to fetch internal or private CodeQL packs.
      packages: read
      # Only required for workflows in private repositories.
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # build-mode: none analyzes source without a full build, so no .NET
          # SDK / restore step (and no .slnx autobuild support) is required.
          - language: csharp
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # The repository's "Default Setup" for code scanning must be disabled so
      # that this advanced configuration can upload its SARIF results.  Attempt
      # to disable it programmatically; the step is a no-op when it is already
      # off.  This requires a token with `administration: write` — set the
      # repository secret GH_ADMIN_TOKEN to a fine-grained PAT or GitHub App
      # installation token with that permission (the default github.token is
      # insufficient).  On failure a workflow warning is emitted rather than
      # failing the build.
      - name: Disable Default CodeQL Setup
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN || github.token }}
        run: |
          gh api --method PATCH \
            /repos/${{ github.repository }}/code-scanning/default-setup \
            --field state=not-configured \
          && echo "Default CodeQL Setup disabled (or was already off)." \
          || echo "::warning::Could not disable Default CodeQL Setup via the API (the token may lack 'administration: write'). Set the repository secret GH_ADMIN_TOKEN to a fine-grained PAT with administration write permission, or manually switch the repository to Advanced setup under Settings → Code security → Code scanning."

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
