name: "CodeQL"

# Advanced CodeQL setup.
#
# This replaces GitHub's "default setup" so we can apply path exclusions via
# .github/codeql/codeql-config.yml (default setup does not support
# paths-ignore).  The "Disable Default CodeQL Setup" step attempts to turn off
# Default Setup so this advanced configuration can upload its SARIF results.
#
# Disabling Default Setup via the API requires a token with
# `administration: write`.  The default `github.token` cannot be granted that
# scope, so a separate secret is needed:
#
#   • Set the repository secret GH_ADMIN_TOKEN to a fine-grained PAT (or
#     GitHub App installation token) with `administration: write` on this repo.
#   • Alternatively, disable Default Setup manually once via
#     Settings → Code security → Code scanning → disable Default Setup.
#
# If neither is done the disable step will fail and the analysis steps are
# skipped automatically (the job still passes with a warning) to avoid the
# fatal "CodeQL analyses from advanced configurations cannot be processed when
# the default setup is enabled" upload error.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly scan, Mondays 03:27 UTC.
    - cron: "27 3 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Required to upload code-scanning results.
      security-events: write
      # Required to fetch internal or private CodeQL packs.
      packages: read
      # Only required for workflows in private repositories.
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # build-mode: none analyzes source without a full build, so no .NET
          # SDK / restore step (and no .slnx autobuild support) is required.
          - language: csharp
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Attempt to turn off the repository's Default CodeQL Setup so that this
      # advanced configuration can upload SARIF without conflict.
      # Requires a token with `administration: write` (github.token cannot
      # obtain that scope).  Set GH_ADMIN_TOKEN to a fine-grained PAT with
      # that permission, or disable Default Setup manually once via
      # Settings → Code security → Code scanning.
      #
      # After the PATCH attempt we read back the current state.  If Default
      # Setup is still "configured" we set skip=true so the two analysis steps
      # below are bypassed; the job completes with a warning rather than
      # crashing at the SARIF upload.
      - name: Disable Default CodeQL Setup
        id: setup-check
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN || github.token }}
        run: |
          if gh api --method PATCH \
              /repos/${{ github.repository }}/code-scanning/default-setup \
              --field state=not-configured 2>/dev/null; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Default CodeQL Setup disabled (or was already off)."
          else
            STATE=$(gh api /repos/${{ github.repository }}/code-scanning/default-setup \
                --jq '.state' 2>/dev/null || echo "unknown")
            if [ "$STATE" = "configured" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::warning::Default CodeQL Setup is enabled (state: $STATE) and could not be disabled."
              echo "::warning::Advanced CodeQL analysis is skipped for this run. To enable it:"
              echo "::warning::  1. Set the GH_ADMIN_TOKEN repository secret to a fine-grained PAT with administration:write permission, OR"
              echo "::warning::  2. Disable Default Setup manually: Settings → Code security → Code scanning."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "Default CodeQL Setup state: $STATE — proceeding with advanced analysis."
            fi
          fi

      - name: Initialize CodeQL
        if: steps.setup-check.outputs.skip != 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        if: steps.setup-check.outputs.skip != 'true'
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
