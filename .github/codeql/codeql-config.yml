name: "HowToSoftware CodeQL config"

# Exclude vendored, third-party client-side libraries from CodeQL analysis.
#
# Everything under wwwroot/lib is shipped as-is (installed via LibMan) and is
# not our source. Its CodeQL findings are false positives in the libraries'
# own feature-detection self-tests / plugin scaffolding rather than issues in
# our code, for example:
#   - js/html-constructed-from-input  (jquery/dist/jquery.js)
#   - js/unsafe-jquery-plugin         (jquery-validation/dist/jquery.validate.js)
# jQuery is already on its latest release, so these cannot be resolved by
# upgrading; excluding the vendored path is the correct, in-repo fix.
#
# NOTE: paths-ignore applies to interpreted languages (JavaScript/TypeScript)
# and to compiled languages analyzed with build-mode: none, which is how this
# repository is configured in .github/workflows/codeql.yml.
paths-ignore:
  - "src/HowToSoftware.Web/wwwroot/lib/**"
